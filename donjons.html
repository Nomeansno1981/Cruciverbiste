     enregistrement du resultat. Moteur et styles partages (jeu.js, jeu.css). -->

// date du jour (heure de Paris) : cle de la grille et libelle affiche
function parisDate(){
  return new Intl.DateTimeFormat("en-CA", { timeZone: "Europe/Paris", year: "numeric", month: "2-digit", day: "2-digit" }).format(new Date());
}
function parisLabel(){
  try{ return new Intl.DateTimeFormat("fr-FR", { timeZone: "Europe/Paris", weekday: "long", day: "numeric", month: "long", year: "numeric" }).format(new Date()); }
  catch(e){ return ""; }
}
// grille demandee via l'URL (?d=AAAA-MM-JJ), pour rejouer une grille precedente
function requestedDate(){
  const p = new URLSearchParams(location.search).get("d");
  return (p && /^\d{4}-\d{2}-\d{2}$/.test(p)) ? p : null;
}
function labelForKey(key){
  try{ const [y, mo, da] = key.split("-").map(Number); return new Intl.DateTimeFormat("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" }).format(new Date(Date.UTC(y, mo - 1, da, 12))); }
  catch(e){ return key; }
}

async function googleLogin(){

  }catch(e){ authError(e); }

async function emailLogin(create){
  const email = $("gEmail").value.trim(), pass = $("gPass").value;
  if(!email || !pass){ warn("Renseignez une adresse e-mail et un mot de passe."); return; }
  info(create ? "Creation du compte..." : "Connexion...");
  try{
    if(create) await m.createUserWithEmailAndPassword(auth, email, pass);
    else await m.signInWithEmailAndPassword(auth, email, pass);
  }catch(e){ authError(e); }
}
function authError(e){
  const code = (e && e.code) || "";
  if(code === "auth/popup-blocked") warn("La fenetre de connexion a ete bloquee. Autorisez les fenetres surgissantes, puis reessayez.");
  else if(code === "auth/popup-closed-by-user" || code === "auth/cancelled-popup-request") warn("Fenetre refermee avant la fin de la connexion. Reessayez.");
  else if(code === "auth/operation-not-allowed") warn("Ce mode de connexion n'est pas active dans la console Firebase.");
  else if(code === "auth/unauthorized-domain") warn("Ce domaine n'est pas autorise dans la console Firebase (Authentication, Settings, Domaines autorises).");
  else if(code === "auth/invalid-email") warn("Adresse e-mail invalide.");
  else if(code === "auth/weak-password") warn("Mot de passe trop court (au moins 6 caracteres).");
  else if(code === "auth/email-already-in-use") warn("Un compte existe deja avec cette adresse. Utilisez Se connecter.");
  else if(code === "auth/invalid-credential" || code === "auth/wrong-password" || code === "auth/user-not-found") warn("Adresse ou mot de passe incorrect.");
  else warn("Connexion impossible : " + (e && e.message ? e.message : e));
}

$("gGoogle").onclick = googleLogin;
$("gSignin").onclick = () => emailLogin(false);
$("gCreate").onclick = () => emailLogin(true);

// Une grille est jouable seulement si elle a des cases ET des mots ET des
// dimensions : un simple champ solution ne suffit pas (un document vide ou
// malforme passait, puis faisait planter le moteur sur une page blanche).
function grilleJouable(p){
  return !!(p && typeof p === "object"
    && p.solution && typeof p.solution === "object" && Object.keys(p.solution).length
    && Array.isArray(p.across) && Array.isArray(p.down) && (p.across.length + p.down.length)
    && p.rows > 0 && p.cols > 0);
}
async function loadPuzzle(dateStr){
  try{
    const snap = await m.getDoc(m.doc(db, "puzzles", dateStr));
    if(snap.exists()){
      const data = snap.data();
      // la grille est stockee en chaine JSON (Firestore refuse les tableaux imbriques)
      let p = data && data.puzzle;
      if(typeof p === "string"){ try{ p = JSON.parse(p); }catch(e){ p = null; } }
      if(grilleJouable(p)){ window.__ddef.source = "firestore"; return p; }
      // le document existe mais la grille est vide ou malformee : message clair
      // (le moteur affiche « Grille indisponible »), plutot que la demonstration
      window.__ddef.source = "invalide";
      return null;
    }
  }catch(e){ window.__ddef.source = "erreur"; return DEMO_PUZZLE; }
  // aucune grille publiee pour cette date : repli sur la demonstration
  window.__ddef.source = "demo";
  return DEMO_PUZZLE;
}

// ---- serie (streak) facon Duolingo ----
function prevDate(ds){
  const [y,mo,d] = ds.split("-").map(Number);
  const dt = new Date(Date.UTC(y, mo-1, d, 12, 0, 0));
  dt.setUTCDate(dt.getUTCDate() - 1);
  return dt.toISOString().slice(0, 10);
}
// serie affichable : le compteur si le dernier jour reussi est aujourd'hui ou
// hier (serie encore vivante), 0 si un jour a ete manque.
function effectiveStreak(doc, today){
  if(!doc || !doc.lastDate) return 0;
  if(doc.lastDate === today || doc.lastDate === prevDate(today)) return doc.count || 0;
  return 0;
}
// nouveau compteur apres une reussite du jour.
function nextStreakCount(doc, today){
  if(!doc || !doc.lastDate) return 1;
  if(doc.lastDate === today) return doc.count || 1;                 // deja compte aujourd'hui
  if(doc.lastDate === prevDate(today)) return (doc.count || 0) + 1; // jour consecutif
  return 1;                                                          // serie rompue, on repart
}
const FLAME = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13 2c.5 4-2.5 5.5-2.5 8.5A2.5 2.5 0 0 0 15 11c0-.6-.1-1 .3-1.6 1.4 1.6 2.7 3.5 2.7 6.1a6 6 0 1 1-12 0c0-4.8 6-7 7-13.5z"/></svg>';
function setStreak(n){
  const el = $("streak");
  if(n > 0){ el.innerHTML = FLAME + " " + n; el.hidden = false; el.title = "Serie : " + n + " jour" + (n > 1 ? "s" : ""); }
  else { el.hidden = true; }
  window.__ddef.streak = n;
}
window.__ddef.effectiveStreak = effectiveStreak;
window.__ddef.nextStreakCount = nextStreakCount;

// ---- profil (avatar, pseudo, historique) ----
let CU = null;                 // utilisateur courant
let profile = { pseudo: "", avatar: "" };
let pendingAvatar = null;      // avatar choisi mais pas encore enregistre

function initial(s){ return ((s || "?").trim().charAt(0) || "?").toUpperCase(); }

async function loadProfile(){

    const d = snap.exists() ? snap.data() : {};
    profile = { pseudo: d.pseudo || "", avatar: d.avatar || "" };

  setHeaderProfile();
}
// redimensionne l'image cote navigateur en un petit carre (data URL), pour la
// ranger avec le profil sans service de stockage
function resizeImage(file, size){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      canvas.getContext("2d").drawImage(img, sx, sy, s, s, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("image illisible")); };
    img.src = url;
  });
}

// ---- classement : publication de la fiche du joueur ----
// (le tableau se consulte desormais sur l'accueil, plus depuis le jeu)
// publie la fiche de classement du joueur : pseudo, XP totale et XP par mois,
// recalculees a partir de toutes ses grilles reussies (robuste aux reprises).
async function updateLeaderboard(){
  if(!CU) return;
  try{
    const snap = await m.getDocs(m.collection(db, "users", CU.uid, "results"));
    let total = 0; const months = {};
    snap.forEach(ds => {
      const d = ds.data();
      if(typeof d.xp !== "number") return;
      total += d.xp;
      const mk = String(d.date || ds.id || "").slice(0, 7);
      if(/^\d{4}-\d{2}$/.test(mk)) months[mk] = (months[mk] || 0) + d.xp;
    });
    const pseudo = profile.pseudo || (CU.email ? CU.email.split("@")[0] : "Joueur");
    window.__ddef.myBoard = { pseudo, total, months };
    if(total > 0){
      await m.setDoc(m.doc(db, "leaderboard", CU.uid), { pseudo, total, months, updatedAt: m.serverTimestamp() });
    }
  }catch(e){ window.__ddef.leaderboardError = String(e); }
}
function openProfile(){
  if(!CU) return;
  pendingAvatar = null;
  $("pseudoInput").value = profile.pseudo || "";
  fillAvatar($("pAvatar"), profile.avatar, profile.pseudo || (CU.email ? CU.email.split("@")[0] : "J"));
  $("pStatus").textContent = ""; $("pStatus").classList.remove("warn");
  $("profileModal").hidden = false;
}
function closeProfile(){ $("profileModal").hidden = true; }
async function saveProfile(){
  if(!CU) return;
  const pseudo = ($("pseudoInput").value || "").trim().slice(0, 24);
  const avatar = (pendingAvatar !== null) ? pendingAvatar : profile.avatar;
  $("pStatus").textContent = "Enregistrement..."; $("pStatus").classList.remove("warn");
  try{
    await m.setDoc(m.doc(db, "users", CU.uid, "state", "profile"), { pseudo, avatar, updatedAt: m.serverTimestamp() }, { merge: true });
    profile = { pseudo, avatar };
    window.__ddef.profile = { pseudo, avatar };
    setHeaderProfile();
    updateLeaderboard();   // rafraichit le pseudo affiche au classement
    closeProfile();
  }catch(e){ $("pStatus").textContent = "Enregistrement impossible : " + ((e && e.message) || e); $("pStatus").classList.add("warn"); }
}

// ---- badges (hauts faits) ----
let badgesCache = null;   // { id: dateObtenue } des badges deja acquis
async function loadBadges(){
  try{
    const snap = await m.getDoc(m.doc(db, "users", CU.uid, "state", "badges"));
    badgesCache = (snap.exists() && snap.data().earned) ? snap.data().earned : {};
  }catch(e){ badgesCache = badgesCache || {}; }
  window.__ddef.badges = badgesCache;
  return badgesCache;
}
// heure de Paris : vrai dans les dix dernieres minutes avant minuit (« Sur le fil »)
function parisAvantMinuit(){
  try{
    const p = new Intl.DateTimeFormat("en-GB", { timeZone: "Europe/Paris", hour: "2-digit", minute: "2-digit", hour12: false }).format(new Date());
    const [h, mi] = p.split(":").map(Number);
    return h === 23 && mi >= 50;
  }catch(e){ return false; }
}
// decerne les badges nouvellement obtenus (jamais deux fois) et les annonce
async function awardBadges(ctx){
  if(!CU) return [];
  const earned = badgesCache || await loadBadges();
  const nouveaux = evaluerBadges(ctx).filter(id => !earned[id]);
  window.__ddef.newBadges = nouveaux;
  if(!nouveaux.length) return [];
  const today = parisDate();
  for(const id of nouveaux) earned[id] = today;
  badgesCache = earned;
  try{ await m.setDoc(m.doc(db, "users", CU.uid, "state", "badges"), { earned }, { merge: true }); }
  catch(e){ window.__ddef.badgeError = String(e); }
  window.__ddef.badges = earned;
  showBadgePopup(nouveaux);
  return nouveaux;
}
function showBadgePopup(ids){
  const list = $("badgeWon"); list.innerHTML = "";
  const defs = ids.map(id => BADGES.find(b => b.id === id)).filter(Boolean);
  for(const b of defs){
    const ico = b.icon ? '<img class="badge-img" alt="" src="' + b.icon + '">' : b.emoji;
    const li = document.createElement("li");
    li.innerHTML = '<span class="badge-ico" aria-hidden="true">' + ico + '</span>'
      + '<span class="badge-won-txt"><span class="badge-won-nom"></span><span class="badge-won-desc"></span></span>';
    li.querySelector(".badge-won-nom").textContent = b.nom;
    li.querySelector(".badge-won-desc").textContent = b.desc;
    list.appendChild(li);
  }
  $("badgeTitle").textContent = defs.length > 1 ? (defs.length + " nouveaux badges !") : "Nouveau badge !";
  $("badgeModal").hidden = false;
}
function closeBadge(){ $("badgeModal").hidden = true; }
// « Aux aguets » : verrou « premier arrive » pour la grille d'une date. La
// transaction atomique garantit qu'un seul joueur (le tout premier a resoudre)
// pose le verrou et decroche le badge, meme en cas de resolutions simultanees.
async function claimFirst(dateStr){
  if(!CU) return false;
  try{
    const ref = m.doc(db, "premiers", dateStr);
    return await m.runTransaction(db, async (tx) => {
      const snap = await tx.get(ref);
      if(snap.exists()) return false;                    // quelqu'un a fini avant
      tx.set(ref, { uid: CU.uid, at: m.serverTimestamp() });
      return true;                                        // premier de la journee !
    });
  }catch(e){ window.__ddef.firstError = String(e); return false; }
}

// Rattrapage des badges deja merites avant l'arrivee du systeme (ou gagnes sur
// un autre appareil) : on lit l'historique et la serie, et on decerne en silence
// les badges manquants — sans fenetre, ce ne sont pas des nouveautes de la
// session. Les badges « de l'instant » (premier, sur le fil, necromant) restent
// hors rattrapage : ils ne se meritent qu'au moment de l'action.
async function reconcileBadges(){
  if(!CU) return;
  try{
    const earned = badgesCache || await loadBadges();
    const [rs, ss] = await Promise.all([
      m.getDocs(m.collection(db, "users", CU.uid, "results")),
      m.getDoc(m.doc(db, "users", CU.uid, "state", "streak"))
    ]);
    const results = []; rs.forEach(ds => results.push(ds.data()));
    const streak = effectiveStreak(ss.exists() ? ss.data() : null, parisDate());
    const manquants = badgesRetroactifs(results, streak).filter(id => !earned[id]);
    if(manquants.length){
      const today = parisDate();
      for(const id of manquants) earned[id] = today;
      badgesCache = earned;
      await m.setDoc(m.doc(db, "users", CU.uid, "state", "badges"), { earned }, { merge: true });
      window.__ddef.badges = earned;
    }
    window.__ddef.reconciled = manquants;
  }catch(e){ window.__ddef.reconcileError = String(e); }
}
if(EMU_MODE){
  // test seulement : vider ses propres badges pour verifier le rattrapage
  window.__ddef.clearBadges = async () => { try{ await m.deleteDoc(m.doc(db, "users", CU.uid, "state", "badges")); badgesCache = {}; window.__ddef.badges = {}; }catch(e){ window.__ddef.clearError = String(e); } };
}

window.__ddef.resize = resizeImage;
window.__ddef.setPendingAvatar = d => { pendingAvatar = d; };
// sonde des regles du classement : lecture d'autrui autorisee, ecriture refusee
window.__ddef.lbProbe = async () => {
  const out = {};
  const other = m.doc(db, "leaderboard", "intrus-" + (CU ? CU.uid : "x"));
  try{ await m.getDoc(other); out.read = "ok"; }catch(e){ out.read = (e && e.code) || String(e); }
  try{ await m.setDoc(other, { pseudo: "Intrus", total: 999999, months: {} }); out.write = "ok"; }catch(e){ out.write = (e && e.code) || String(e); }
  return out;
};
// sonde des regles du verrou « premier » : usurper l'uid d'autrui est refuse,
// poser sa propre fiche est permis
window.__ddef.firstProbe = async () => {
  const out = {};
  const ref = m.doc(db, "premiers", "sonde-" + (CU ? CU.uid : "x"));
  try{ await m.setDoc(ref, { uid: "un-autre-joueur" }); out.spoof = "ok"; }catch(e){ out.spoof = (e && e.code) || String(e); }
  try{ await m.setDoc(ref, { uid: CU.uid }); out.self = "ok"; }catch(e){ out.self = (e && e.code) || String(e); }
  return out;
};

$("profileBtn").onclick = openProfile;
$("closeProfile").onclick = closeProfile;
$("saveProfile").onclick = saveProfile;
$("closeBadge").onclick = closeBadge;
$("badgeModal").addEventListener("click", e => { if(e.target === $("badgeModal")) closeBadge(); });
$("signOut").onclick = async () => { try{ await m.signOut(auth); }catch(e){} location.reload(); };
$("profileModal").addEventListener("click", e => { if(e.target === $("profileModal")) closeProfile(); });
$("pickAvatar").onclick = () => $("avatarInput").click();
$("removeAvatar").onclick = () => { pendingAvatar = ""; fillAvatar($("pAvatar"), "", $("pseudoInput").value || "J"); };
$("avatarInput").onchange = async e => {
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  $("pStatus").textContent = ""; $("pStatus").classList.remove("warn");
  try{ pendingAvatar = await resizeImage(f, 128); fillAvatar($("pAvatar"), pendingAvatar, ""); }
  catch(err){ $("pStatus").textContent = "Image illisible."; $("pStatus").classList.add("warn"); }
  e.target.value = "";
};

let mounted = false;
m.onAuthStateChanged(auth, async user => {
  if(!user){
    gate.hidden = false;
    $("profileBtn").hidden = true;
    closeProfile();
    if(!mounted) info("");
    return;
  }
  CU = user;
  gate.hidden = true;   // connecte : on masque l'ecran de connexion sans attendre le chargement de la grille
  $("profileBtn").hidden = false;
  if(isAdmin(user)) $("atelierLink").hidden = false;   // accès direct à l'atelier, auteur seul
  loadProfile();
  if(mounted) return;
  mounted = true;

  const todayStr = parisDate();
  const dateStr = requestedDate() || todayStr;   // grille du jour, ou grille precedente via ?d=
  const isToday = dateStr === todayStr;
  window.__ddef.playedDate = dateStr;
  const puzzle = await loadPuzzle(dateStr);

  // grille déjà résolue par ce joueur : on la propose en revue (lecture seule),
  // les cases dévoilées en rouge. L'auteur peut en sortir via « Rejouer ».
  let review = null;
  try{
    const rs = await m.getDoc(m.doc(db, "users", user.uid, "results", dateStr));
    const r = rs.exists() ? rs.data() : null;
    if(r && r.solved) review = { given: r.given || [], solvedWords: r.solvedWords || [], seconds: r.seconds };
  }catch(e){ /* pas de revue : la grille se joue normalement */ }
  window.__ddef.review = !!review;

  // serie du joueur, affichee au chargement (independante de la grille jouee)
  try{
    const s = await m.getDoc(m.doc(db, "users", user.uid, "state", "streak"));
    setStreak(effectiveStreak(s.exists() ? s.data() : null, todayStr));
  }catch(e){ /* pas de serie affichee */ }

  // lien de retour vers l'accueil, ajoute a la banniere de victoire
  const homeLink = () => {
    const b = document.getElementById("banner");
    if(b && b.classList.contains("show") && !b.querySelector(".banner-home")){
      b.innerHTML += ' <a class="banner-home" href="accueil.html">Retour à l\'accueil</a>';
    }
  };

  const saveResult = async (seconds, stats = {}) => {
    try{
      const ref = m.doc(db, "users", user.uid, "results", dateStr);
      const data = { solved: true, seconds, date: dateStr, at: m.serverTimestamp() };
      for(const key of ["xp", "hints", "solutions", "words"]){
        if(typeof stats[key] === "number") data[key] = stats[key];
      }
      // cases dévoilées, pour la revue en lecture seule (indice = lettre, solution = mot)
      if(Array.isArray(stats.given)) data.given = stats.given;
      if(Array.isArray(stats.solvedWords)) data.solvedWords = stats.solvedWords;
      await m.setDoc(ref, data, { merge: true });
      const snap = await m.getDoc(ref);
      window.__ddef.result = snap.exists() ? snap.data() : null;
    }catch(e){ window.__ddef.resultError = String(e); }
    // publie la fiche de classement mise a jour (toutes grilles confondues)
    await updateLeaderboard();
    // la serie ne compte que la grille du jour ; une grille precedente ne la touche pas
    let streakNow = window.__ddef.streak || 0;   // serie courante (inchangee hors du jour)
    if(isToday){
      try{
        const sref = m.doc(db, "users", user.uid, "state", "streak");
        const cur = await m.getDoc(sref);
        const n = nextStreakCount(cur.exists() ? cur.data() : null, todayStr);
        await m.setDoc(sref, { count: n, lastDate: todayStr, at: m.serverTimestamp() });
        setStreak(n);
        streakNow = n;
        const b = document.getElementById("banner");
        if(b && b.classList.contains("show")) b.innerHTML += ` Serie : ${n} jour${n > 1 ? "s" : ""}.`;
      }catch(e){ window.__ddef.streakError = String(e); }
    }
    // badges : on compte les grilles reussies et on decerne les nouveaux hauts faits
    try{
      let totalSolved = 0;
      const rs = await m.getDocs(m.collection(db, "users", user.uid, "results"));
      rs.forEach(ds => { const d = ds.data(); if(d && d.solved) totalSolved++; });
      const noAid = (stats.hints === 0 && stats.solutions === 0);
      // « Aux aguets » : seul le tout premier a finir la grille du jour l'obtient
      const isFirstOfDay = isToday ? await claimFirst(todayStr) : false;
      await awardBadges({
        totalSolved, seconds, streak: streakNow,
        noAid, isArchive: !isToday, lateFinish: isToday && parisAvantMinuit(),
        isFirstOfDay
      });
    }catch(e){ window.__ddef.badgeError = String(e); }
    homeLink();
  };

  const play = monterJeu(puzzle, { onSolved: saveResult, dateText: isToday ? parisLabel() : labelForKey(dateStr), review });
  // Rejouer (auteur seul) : remet la grille à zéro pour la retester, sans rien enregistrer
  if(isAdmin(user)){
    const rb = $("replayBtn");
    rb.hidden = false;
    rb.onclick = () => { play.replay(); };
  }
  // rattrapage des badges deja merites (grilles faites avant les badges, etc.)
  await reconcileBadges();
  window.__ddef.ready = true;
});
</script>
</body>
