name: deploiement-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  publier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construire le contenu du site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          touch _site/.nojekyll

      - name: Publier sur la branche gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publication du site (${GITHUB_SHA::7})"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
