name: deploiement-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  publier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Construire le contenu du site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp jouer.html _site/jouer.html
          cp donjons.html _site/donjons.html
          cp publier.html _site/publier.html
          cp jeu.js _site/jeu.js
          cp jeu.css _site/jeu.css
          # le tampon de version du pied de page permet de vérifier d'un coup
          # d'oeil que le navigateur affiche bien la dernière version publiée
          horodatage="$(TZ=Europe/Paris date +%d/%m/%Y)"
          tampon="version ${GITHUB_SHA::7} publiée le ${horodatage}"
          sed -i "s|version de travail|${tampon}|" _site/index.html
          sed -i "s|version de travail|${tampon}|" _site/jouer.html
          sed -i "s|version de travail|${tampon}|" _site/donjons.html
          sed -i "s|version de travail|${tampon}|" _site/publier.html
          touch _site/.nojekyll

      - name: Publier sur la branche gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publication du site (${GITHUB_SHA::7})"
          # une poussée concurrente peut faire bouger la branche entre la
          # négociation et l'écriture : on réessaie plutôt que d'échouer
          for essai in 1 2 3; do
            if git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages; then
              exit 0
            fi
            echo "poussée rejetée (concurrence probable), nouvel essai ${essai}"
            sleep 5
          done
          exit 1
