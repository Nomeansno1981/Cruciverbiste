<!-- Donjons & Definitions : apercu du jeu, autonome (grille de demonstration,
     aucune connexion). Le moteur et les styles sont partages (jeu.js, jeu.css) ;
     donjons.html reutilise les memes avec la connexion et la grille du jour. -->
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Donjons &amp; Définitions</title>
<link rel="stylesheet" href="jeu.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <svg class="mark" viewBox="0 0 30 30" aria-hidden="true">
        <rect x="1" y="1" width="28" height="28" rx="2" fill="none" stroke="#211E17" stroke-width="1.6"/>
        <line x1="10.3" y1="1" x2="10.3" y2="29" stroke="#211E17" stroke-width="1.2"/>
        <line x1="19.6" y1="1" x2="19.6" y2="29" stroke="#211E17" stroke-width="1.2"/>
        <line x1="1" y1="10.3" x2="29" y2="10.3" stroke="#211E17" stroke-width="1.2"/>
        <line x1="1" y1="19.6" x2="29" y2="19.6" stroke="#211E17" stroke-width="1.2"/>
        <rect x="10.3" y="10.3" width="9.3" height="9.3" fill="#7C1D2E"/>
      </svg>
      <div>
        <h1>Donjons &amp; Définitions</h1>
        <div class="date" id="date"></div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="meta">
      <span class="mode">Aperçu</span>
      <span class="timer" id="timer">0:00</span>
    </div>
  </header>

  <div class="banner" id="banner"></div>

  <div class="layout">
    <div class="gridarea"><div class="board" id="board"></div></div>

    <div class="cluebar" id="cluebar">
      <button class="arrow" id="prevClue" aria-label="Definition precedente">&#8249;</button>
      <div class="txt" id="cluebarTxt"></div>
      <button class="arrow" id="nextClue" aria-label="Definition suivante">&#8250;</button>
    </div>

    <div class="tools">
      <button class="tool" id="hintBtn">Indice</button>
      <button class="tool" id="solveBtn">Solution</button>
      <button class="tool" id="muteBtn" aria-label="Couper le son">🔊</button>
    </div>

    <div class="kbd" id="kbd"></div>

    <aside class="aside">
      <div class="cols">
        <div><h2>Horizontalement</h2><ol id="acrossList"></ol></div>
        <div><h2>Verticalement</h2><ol id="downList"></ol></div>
      </div>
    </aside>
  </div>

  <div class="stamp">version de travail</div>
</div>

<script type="module">
import { monterJeu, DEMO_PUZZLE } from "./jeu.js";
// Apercu depuis l'atelier : une grille peut etre deposee dans le stockage local
// (cle dd-apercu), lue une seule fois. Sinon, grille de demonstration.
let puzzle = null;
try {
  const raw = localStorage.getItem("dd-apercu");
  if(raw){ puzzle = JSON.parse(raw); localStorage.removeItem("dd-apercu"); }
} catch(e){ puzzle = null; }
monterJeu(puzzle || DEMO_PUZZLE, puzzle ? { dateText: "Aperçu · " + (puzzle.title || "votre grille") } : {});
</script>
</body>
</html>
